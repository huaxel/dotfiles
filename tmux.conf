# ============================================
# Tmux Config: Functional + Clean Aesthetic
# Optimized for: Mac + iPhone (Termius) SSH workflows
# ============================================

# --------------------------------------------
# Basics - Use Ctrl+a as prefix
# --------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --------------------------------------------
# Terminal & Colors
# --------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# --------------------------------------------
# Mouse & Scrolling (essential for mobile!)
# --------------------------------------------
set -g mouse on

# --------------------------------------------
# Window/Pane Management
# --------------------------------------------

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Ctrl+h/j/k/l
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# --------------------------------------------
# Window Management (kill, rename, etc)
# --------------------------------------------

# Kill window: Ctrl+a + x (confirmation required)
bind x confirm-before -p "kill window #W? (y/n)" kill-window

# Quick window kill without confirmation (be careful!)
bind X kill-window

# Kill pane: Ctrl+a + q
bind q confirm-before -p "kill pane? (y/n)" kill-pane

# Rename window: Ctrl+a + ,
bind , command-prompt -I "#W" "rename-window '%%'"

# Move window left/right: Ctrl+a + < or >
bind < swap-window -t -1
bind > swap-window -t +1

# Renumber windows when one closes (no gaps!)
set -g renumber-windows on

# --------------------------------------------
# Moshi Integration
# --------------------------------------------
set -g set-titles on
set -g set-titles-string "#I: #W"
set -g base-index 1
setw -g pane-base-index 1

# Propagate MOSHI_CLIENT into tmux sessions
set-option -ga update-environment " MOSHI_CLIENT"

# Clear status regions for Moshi clients so swipe detection stays clean
if-shell '[ -n "$MOSHI_CLIENT" ]' {
  set -g status-left ''
  set -g status-right ''
}

# --------------------------------------------
# Session Management
# --------------------------------------------

# Kill session: Ctrl+a + Shift+k
bind K confirm-before -p "kill-session #S? (y/n)" kill-session

# --------------------------------------------
# Copy Mode (Vi-style)
# --------------------------------------------
set -g mode-keys vi

# v to start selection, y to copy
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Double/triple click to select word/line
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line

# --------------------------------------------
# Status Bar - Clean + Informative
# --------------------------------------------
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Colors: Dark slate background with accent colors
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left side: [session-name] active-indicator
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[bg=#1e1e2e,fg=#89b4fa] "
set -g status-left-length 40

# Right side: hostname | time | date
set -g status-right "#[fg=#6c7086]#{host_short} #[fg=#585b70]|#[fg=#cdd6f4] %H:%M #[fg=#585b70]|#[fg=#cdd6f4] %d %b "
set -g status-right-length 50

# Window list style
set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#a6e3a1,bold] #I:#W #[bg=#1e1e2e,fg=#a6e3a1]"
set -g window-status-separator ""

# --------------------------------------------
# Pane Borders - Subtle
# --------------------------------------------
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-lines single

# --------------------------------------------
# Message & Command Line
# --------------------------------------------
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# --------------------------------------------
# Quality of Life
# --------------------------------------------
set -g history-limit 100000
set -sg escape-time 0
set -g focus-events on
setw -g aggressive-resize on
set -g allow-rename off
set -g automatic-rename off

# Reload config: Ctrl+a + r
bind r source-file ~/.tmux.conf \; display-message " config reloaded ✓"

# --------------------------------------------
# Quick Actions for Agentic Workflows
# --------------------------------------------

# Sync panes (type in all panes at once - toggle): Ctrl+a + S
bind S set-window-option synchronize-panes

# Clear screen and history: Ctrl+a + C
bind C send-keys -R \; clear-history \; display-message " history cleared"

