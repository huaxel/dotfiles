; swa-full = true  — disabled, crashes Vulkan context setup on Strix Halo
spec-type = draft-mtp
spec-draft-n-max = 3
spec-draft-p-min = 0.3
spec-draft-type-k = q8_0
spec-draft-type-v = q8_0
; fit=false — Vulkan ErrorDeviceLost in auto-fit probe
