{{#if (eq os "linux")}}
; ──────────────────────────────────────────────────────────
; Strix Halo (AMD RYZEN AI MAX+ 395 / Radeon 8060S)
; Vulkan/RADV backend — no ROCm/KFD (GPF bug on Strix)
; CachyLLama fork config: SSD KV cache + unified KV + checkpoints.
; Requires /opt/cachy-llama/bin/llama-server (deploy/build-release.sh);
; the upstream package will fail on the cache-ssd keys.
; ──────────────────────────────────────────────────────────
[*]
c = 65536
n-gpu-layers = all
flash-attn = true
jinja = true
threads = 14
threads-batch = 28
batch-size = 4096
ubatch-size = 1024
cache-type-k = q8_0
cache-type-v = q8_0
load-on-startup = false
device = Vulkan0
no-mmap = true
cache-reuse = 256
no-cache-idle-slots = true
slot-prompt-similarity = 0.20
kv-unified = true
ctx-checkpoints = 64

; ── Large reasoning (MTP / speculative decoding) ──

[Qwen3.6-27B-MTP]
model = {{ models_base_path }}/models--unsloth--Qwen3.6-27B-MTP-GGUF/snapshots/5cb35eb3dcbf52dbce5f87dbc64df6aaffadcace/Qwen3.6-27B-Q4_K_M.gguf
