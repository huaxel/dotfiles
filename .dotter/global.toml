# Dotter configuration - migrated from chezmoi
[default]

[default.files]
# Core dotfiles
zshrc = "~/.zshrc"           # Keep for zsh compatibility (if needed)
gitconfig = "~/.gitconfig"   # Template for user info
ideavimrc = "~/.ideavimrc"
gitignore_global = "~/.gitignore_global"
ssh_config = "~/.ssh/config"
{{#if (not (eq os "windows"))}}
config = "~/.config"         # Includes fish/, nvim/, etc.
{{/if}}
aerospace = "~/.aerospace.toml"
"tmux.conf" = "~/.tmux.conf"
npmrc = "~/.npmrc"
"starship.toml" = "~/.config/starship.toml"

# Pi agent configuration
pi_settings = "~/.pi/agent/settings.json"
"pi_models.json" = "~/.pi/agent/models.json"
pi_append_system = "~/.pi/agent/APPEND_SYSTEM.md"
pi_extensions = { target = "~/.pi/agent/extensions", type = "symbolic" }
{{#if (not (eq os "windows"))}}
skills = { target = "~/.agents/skills", type = "symbolic" }
{{/if}}
"pi_npm/package.json" = "~/.pi/agent/npm/package.json"

[windows.files]
# VS Code
"config/vscode/settings.json" = { target = "$APPDATA\\Code\\User\\settings.json", type = "symbolic" }
"config/vscode/profiles" = { target = "$APPDATA\\Code\\User\\profiles", type = "symbolic" }

# Zed
"config/zed/keymap.json" = { target = "$LOCALAPPDATA\\Zed\\keymap.json", type = "symbolic" }

# GitHub Copilot instructions (IntelliJ on Windows)
"config/github-copilot/intellij" = { target = "$APPDATA\\JetBrains\\github-copilot", type = "symbolic" }

# PowerShell 7 profile
"powershell/7/profile.ps1" = { target = "~\\Documents\\PowerShell\\Microsoft.PowerShell_profile.ps1", type = "symbolic" }

# PowerShell 5.1 profile
"powershell/5.1/profile.ps1" = { target = "~\\Documents\\WindowsPowerShell\\Microsoft.PowerShell_profile.ps1", type = "symbolic" }

# Windows Terminal
"windows-terminal/settings.json" = { target = "$LOCALAPPDATA\\Packages\\Microsoft.WindowsTerminal_8wekyb3d8bbwe\\LocalState\\settings.json", type = "symbolic" }

# AutoHotkey — Mac-like key remap (deploy script to config dir)
"autohotkey/mac-layout.ahk" = { target = "~\\.config\\autohotkey\\mac-layout.ahk", type = "symbolic" }

# GlazeWM — Tiling window manager
"glazewm/config.yaml" = { target = "~\\.glzr\\glazewm\\config.yaml", type = "symbolic" }

# Zebar — Status bar for GlazeWM
"zebar/settings.json" = { target = "~\\.glzr\\zebar\\settings.json", type = "symbolic" }

# Neovim
"config/nvim" = { target = "~\\AppData\\Local\\nvim", type = "symbolic" }

# Bat — cat replacement with syntax highlighting
"config/bat" = { target = "~\\.config\\bat", type = "symbolic" }

# Btop — resource monitor
"config/btop" = { target = "~\\.config\\btop", type = "symbolic" }

# Broot — file tree navigator
"config/broot" = { target = "~\\.config\\broot", type = "symbolic" }

# Eza — modern ls replacement
"config/eza" = { target = "~\\.config\\eza", type = "symbolic" }

# Fastfetch — system info
"config/fastfetch" = { target = "~\\.config\\fastfetch", type = "symbolic" }

