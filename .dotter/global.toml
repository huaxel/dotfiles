# Dotter configuration - migrated from chezmoi
[default]

[default.files]
# Core dotfiles
zshrc = "~/.zshrc"           # Keep for zsh compatibility (if needed)
gitconfig = "~/.gitconfig"   # Template for user info
ideavimrc = "~/.ideavimrc"
gitignore_global = "~/.gitignore_global"
ssh_config = "~/.ssh/config"
config = "~/.config"         # Includes fish/, nvim/, etc.
aerospace = "~/.aerospace.toml"
"tmux.conf" = "~/.tmux.conf"
npmrc = "~/.npmrc"

# Pi agent configuration
pi_settings = "~/.pi/agent/settings.json"
pi_append_system = "~/.pi/agent/APPEND_SYSTEM.md"
pi_extensions = "~/.pi/agent/extensions"
skills = "~/.agents/skills"
"skills/performance/SKILL.md" = { target = "~/.agents/skills/performance/SKILL.md", type = "symbolic" }
"skills/impeccable/scripts/context-signals.mjs" = { target = "~/.agents/skills/impeccable/scripts/context-signals.mjs", type = "symbolic" }
"skills/impeccable/scripts/live-accept.mjs" = { target = "~/.agents/skills/impeccable/scripts/live-accept.mjs", type = "symbolic" }
"skills/impeccable/scripts/detect-csp.mjs" = { target = "~/.agents/skills/impeccable/scripts/detect-csp.mjs", type = "symbolic" }
"skills/impeccable/scripts/live-wrap.mjs" = { target = "~/.agents/skills/impeccable/scripts/live-wrap.mjs", type = "symbolic" }
"skills/impeccable/scripts/live-browser.js" = { target = "~/.agents/skills/impeccable/scripts/live-browser.js", type = "symbolic" }
"skills/impeccable/scripts/pin.mjs" = { target = "~/.agents/skills/impeccable/scripts/pin.mjs", type = "symbolic" }
"skills/impeccable/scripts/cleanup-deprecated.mjs" = { target = "~/.agents/skills/impeccable/scripts/cleanup-deprecated.mjs", type = "symbolic" }
"skills/impeccable/scripts/live-insert.mjs" = { target = "~/.agents/skills/impeccable/scripts/live-insert.mjs", type = "symbolic" }
