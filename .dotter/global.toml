# Dotter configuration
[default]

[default.files]
# Core dotfiles
gitconfig = "~/.gitconfig"
gitignore_global = "~/.gitignore_global"
ssh_config = "~/.ssh/config"
aerospace = "~/.aerospace.toml"
npmrc = "~/.npmrc"
"starship.toml" = "~/.config/starship.toml"

# Pi agent configuration
pi_settings = "~/.pi/agent/settings.json"
# llama.cpp models.ini — template because model paths are machine-specific
"llama-models.ini" = "~/.config/llama.cpp/models.ini"
pi_append_system = "~/.pi/agent/APPEND_SYSTEM.md"
pi_extensions = { target = "~/.pi/agent/extensions", type = "symbolic", recurse = false }
pi_npm = { target = "~/.pi/agent/npm", type = "symbolic", recurse = false }

[windows.files]
# Zed
"config/zed/keymap.json" = { target = "$LOCALAPPDATA\\Zed\\keymap.json", type = "symbolic" }

# PowerShell 7 profile
"powershell/7/profile.ps1" = { target = "~\\Documents\\PowerShell\\Microsoft.PowerShell_profile.ps1", type = "symbolic" }

# PowerShell 5.1 profile
"powershell/5.1/profile.ps1" = { target = "~\\Documents\\WindowsPowerShell\\Microsoft.PowerShell_profile.ps1", type = "symbolic" }

# Windows Terminal
"windows-terminal/settings.json" = { target = "$LOCALAPPDATA\\Packages\\Microsoft.WindowsTerminal_8wekyb3d8bbwe\\LocalState\\settings.json", type = "symbolic" }

# AutoHotkey — Mac-like key remap
"autohotkey/mac-layout.ahk" = { target = "~\\.config\\autohotkey\\mac-layout.ahk", type = "symbolic" }

# Flow Launcher
"flow-launcher/README.md" = { target = "~\\.config\\flow-launcher\\README.md", type = "symbolic" }

# GlazeWM — Tiling window manager
"glazewm/config.yaml" = { target = "~\\.glzr\\glazewm\\config.yaml", type = "symbolic" }

# Zebar — Status bar for GlazeWM
"zebar/settings.json" = { target = "~\\.glzr\\zebar\\settings.json", type = "symbolic" }

# Neovim
"config/nvim" = "~\\AppData\\Local\\nvim"

# llama.cpp Windows launcher
"config/llama.cpp/start-server.ps1" = "~\\.config\\llama.cpp\\start-server.ps1"
"config/llama.cpp/README-windows.md" = "~\\.config\\llama.cpp\\README.md"

# Bat — cat replacement with syntax highlighting
"config/bat" = "~\\.config\\bat"

# Btop — resource monitor
"config/btop" = "~\\.config\\btop"

# Eza — modern ls replacement
"config/eza" = "~\\.config\\eza"

# Fastfetch — system info
"config/fastfetch" = "~\\.config\\fastfetch"

[unix.files]
# macOS/Linux-only: full config directory (individual configs are in windows.files)
config = "~/.config"
# llama.cpp mcp.json is auto-generated by sync-mcp-configs.py

# CI files — must be symlinks, not templates (dotter parses all config/ files as
# Handlebars, and these files use {{justfile()}} / ${{ fromJSON(...) }} syntax).
"config/ci/.github/workflows/ci.yml" = { target = "~/.config/ci/.github/workflows/ci.yml", type = "symbolic" }

