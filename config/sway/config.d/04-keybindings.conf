### Key binding
# Start a terminal
bindsym $mod+Return exec $term

# Kill focused window
bindsym $mod+q kill
bindsym $mod+w kill

# Launch launcher
bindsym Mod4+space exec $menu

# Drag floating windows by holding down $mod and left mouse button.
# Resize them with right mouse button + $mod.
# Despite the name, also works for non-floating windows.
# Change normal to inverse to use left mouse button for resizing and right
# mouse button for dragging.
floating_modifier $mod normal

# Reload the configuration file
bindsym $mod+Shift+c reload

# We tell Sway: "When I press Cmd+C, send Ctrl+C to the active window"
# Useful for mimicking macOS shortcuts
bindsym $mod+c exec wtype -M ctrl c -m ctrl
bindsym $mod+v exec wtype -M ctrl v -m ctrl
bindsym $mod+x exec wtype -M ctrl x -m ctrl
bindsym $mod+z exec wtype -M ctrl z -m ctrl
bindsym $mod+a exec wtype -M ctrl a -m ctrl

# Moving around:
#
# Move your focus around
bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right

# Or use $mod+[up|down|left|right]
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

# Move the focused window with the same, but add Shift
bindsym $mod+Shift+$left move left
bindsym $mod+Shift+$down move down
bindsym $mod+Shift+$up move up
bindsym $mod+Shift+$right move right
# Ditto, with arrow keys
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

#
# Workspaces:
#
# Switch to workspace
bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+5 workspace number 5
bindsym $mod+6 workspace number 6
bindsym $mod+7 workspace number 7
bindsym $mod+8 workspace number 8
bindsym $mod+9 workspace number 9
bindsym $mod+0 workspace number 10

# Move focused container to workspace
bindsym $mod+Shift+1 move container to workspace number 1
bindsym $mod+Shift+2 move container to workspace number 2
bindsym $mod+Shift+3 move container to workspace number 3
bindsym $mod+Shift+4 move container to workspace number 4
bindsym $mod+Shift+5 move container to workspace number 5
bindsym $mod+Shift+6 move container to workspace number 6
bindsym $mod+Shift+7 move container to workspace number 7
bindsym $mod+Shift+8 move container to workspace number 8
bindsym $mod+Shift+9 move container to workspace number 9
bindsym $mod+Shift+0 move container to workspace number 10

# Workspace back and forth (Aerospace alt-tab)
bindsym $mod+Tab workspace back_and_forth

# Move workspace to monitor (Aerospace alt-shift-tab)
bindsym $mod+Shift+Tab move workspace to output next

# Workspace labels
workspace 1 output $LG_monitor label "1: Browser"
workspace 2 output $IIYAMA_monitor label "2: Notes"
workspace 3 output $HP_monitor label "3: Comms"
workspace 4 output $LG_monitor label "4: Dev"
workspace 5 output $LG_monitor label "5: Music"
workspace 6 output $LG_monitor label "6: Tmux"
#
# Layout stuff:
#
bindsym $mod+s layout stacking
bindsym $mod+t layout tabbed
bindsym $mod+slash layout toggle split
bindsym $mod+f fullscreen
bindsym $mod+Shift+space floating toggle
bindsym $mod+p focus parent
bindsym $mod+Shift+p focus child

#
# Scratchpad:
#
# Sway has a "scratchpad", which is a bag of holding for windows.
# You can send windows there and get them back later.

# Move the currently focused window to the scratchpad
bindsym $mod+Shift+minus move scratchpad

# Show the next scratchpad window or hide the focused scratchpad window.
# If there are multiple scratchpad windows, this command cycles through them.
bindsym $mod+minus scratchpad show

#
# Resizing containers:
#
mode "resize" {
# left will shrink the containers width
# right will grow the containers width
# up will shrink the containers height
# down will grow the containers height
bindsym $left resize shrink width 10px
bindsym $down resize grow height 10px
bindsym $up resize shrink height 10px
bindsym $right resize grow width 10px

# Ditto, with arrow keys
bindsym Left resize shrink width 10px
bindsym Down resize grow height 10px
bindsym Up resize shrink height 10px
bindsym Right resize grow width 10px

# Return to default mode
bindsym Return mode "default"
bindsym Escape mode "default"
}
bindsym $mod+r mode "resize"

#
# Media Keys and Special Function Keys
#
# Brightness (commented out until brightnessctl is installed)
# bindsym XF86MonBrightnessDown exec brightnessctl set 5%-
# bindsym XF86MonBrightnessUp exec brightnessctl set +5%

# Audio Volume
bindsym XF86AudioRaiseVolume exec volumectl -u up
bindsym XF86AudioLowerVolume exec volumectl -u down
bindsym XF86AudioMute exec pactl set-sink-mute @DEFAULT_SINK@ toggle
bindsym XF86AudioMicMute exec pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Media player controls
bindsym XF86AudioPlay exec playerctl play-pause
bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPrev exec playerctl previous

# Keyboard backlight
bindsym XF86KbdBrightnessUp exec brightnessctl --device='*kbd*' set +10%
bindsym XF86KbdBrightnessDown exec brightnessctl --device='*kbd*' set 10%-

# Keyboard layout switcher (Waybar + Super+K)
bindsym $mod+k exec ~/.config/sway/scripts/switch-kb-layout.sh

# Screenshots with grimblast
bindsym Print exec grimblast --notify save output
bindsym Shift+Print exec grimblast --notify save area

# Clipboard history
bindsym $mod+Shift+v exec cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Window switcher
bindsym $mod+grave exec fuzzel

# Lock screen
bindsym $mod+l exec ~/.config/sway/scripts/lock.sh

# Calculator
bindsym $mod+equal exec wofi-calc

# Dim screen (overlay, not absolute brightness)
bindsym $mod+d exec swaymsg opacity 0.7

# Reload sway config
bindsym $mod+Shift+r exec swaymsg reload

# Emergency workspace reset - move all windows to ws 1
bindsym $mod+Shift+e exec bash -c "for win in $(swaymsg -t get_tree | jq -r '.. | objects | select(.focused) // empty | .id'); do swaymsg '[con_id=$win] move container to workspace number 1'; done"

# Screenshots with grimblast
bindsym Print exec grimblast --notify save output
bindsym Shift+Print exec grimblast --notify save area
bindsym $mod+Shift+x exec /home/juan/.config/wofi/scripts/wofi-power.sh
bindsym $mod+Shift+w exec /home/juan/.config/wofi/scripts/wofi-wifi.sh
