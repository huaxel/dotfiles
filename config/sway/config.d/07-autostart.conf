### Idle configuration

# Start elephant service for Walker file search provider
exec_always systemctl --user start elephant

exec swayidle -w \
timeout 300 '~/.config/sway/scripts/lock.sh' \
timeout 600 'swaymsg "output * power off"' \
resume 'swaymsg "output * power on"' \
before-sleep '~/.config/sway/scripts/lock.sh'

# Environment variables for XWayland apps (Steam, etc.)
# Note: GDK_SCALE removed - was causing 2x scaling issues
# Add to ~/.bashrc or ~/.config/fish/config.fish if you need HiDPI scaling:
# export GDK_SCALE=2 GDK_DPI_SCALE=0.5 XCURSOR_SIZE=32

# The following daemon is used for notifications (e.g. mako, swaync)
exec mako

# Waybar
exec waybar

# Autotiling
exec_always ~/.config/sway/scripts/autotiling.sh

# Clipboard history
exec wl-paste --watch cliphist store

# Polkit authentication agent
exec /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
