### Variables
# command as mod key
set $mod Mod1

# monitor names
set $LG_monitor DP-4
set $HP_monitor DP-1
set $IIYAMA_monitor HDMI-A-1

# Home row direction keys, QWERTY vim-style
set $left h
set $down j
set $up k
set $right l

# Your preferred terminal emulator
set $term ghostty

# Your preferred application launcher
set $menu walker
