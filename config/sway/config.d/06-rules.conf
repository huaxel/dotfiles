### Window Rules (From Aerospace)
# zen-browser -> ws 1
for_window [app_id="app.zen-browser.zen"] move container to workspace number 1

# WhatsApp -> ws 3
for_window [app_id="net.whatsapp.WhatsApp"] move container to workspace number 3

# Discord -> ws 3
for_window [app_id="com.hnc.Discord"] move container to workspace number 3
for_window [app_id="discord"] move container to workspace number 3

# Obsidian -> ws 2
for_window [app_id="md.obsidian"] move container to workspace number 2

# Picture-in-Picture (Firefox/Chrome/Chromium video pop-out)
for_window [title="^Picture-in-Picture$"] {
    floating enable
    sticky enable
    resize set 400 225
    move position 80% 80%
    border pixel 0
    shadow enable
}

# Keep PIP on top of fullscreen windows
for_window [title="^Picture-in-Picture$"] fullscreen disable

# YouTube/Twitch PIP shortcuts (browser-specific)
for_window [app_id="firefox" title="Picture-in-Picture"] floating enable, sticky enable
for_window [app_id="chromium*" title="Picture in picture"] floating enable, sticky enable
for_window [app_id="ghostty"] floating disable
for_window [app_id="lazygit"] fullscreen disable
for_window [app_id="ncmpcpp"] fullscreen disable
for_window [app_id="himalaya"] fullscreen disable
for_window [app_id="tmux"] floating disable

# Move TUI apps to appropriate workspaces
for_window [app_id="lazygit"] move container to workspace 4
for_window [app_id="ncmpcpp"] move container to workspace 5
for_window [app_id="himalaya"] move container to workspace 4
for_window [app_id="tmux"] move container to workspace 6
