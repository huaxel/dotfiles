# Dual-keyboard layout: Colemak (index 0) + QWERTY UK (index 1)
# Matches the Keychron keyboard by vendor:product
# Switch with: ~/.config/sway/scripts/switch-kb-layout.sh
# Or Super+K

# Keychron in Windows mode with Mac-labeled keycaps.
# Swap Win/Alt so the opt/alt-labeled key becomes Mod1 and the cmd/super-labeled key becomes Mod4.
# Keycap layout: Ctrl | opt/alt | cmd/super | Space
input "13364:53296:Keychron__Keychron_Link__Keyboard" {
    xkb_layout "us,gb"
    xkb_variant "colemak,"
    xkb_options "altwin:swap_alt_win"
}
