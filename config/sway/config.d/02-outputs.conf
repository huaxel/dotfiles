### Output configuration
# Default wallpaper (more resolutions are available in /usr/share/backgrounds/sway/)
output * bg /home/juan/Pictures/mountains-bg.jpg fill

# You can get the names of your outputs by running: swaymsg -t get_outputs

output $LG_monitor {
	scale 2
	pos 0 0
	transform normal
}

output $HP_monitor {
	scale 1
	pos 1920 0
	transform normal
}

output $IIYAMA_monitor {
	scale 1
	pos -1080 0
	transform 270
}
