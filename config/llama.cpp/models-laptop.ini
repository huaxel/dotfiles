version = 1

; ============================================================
; Laptop: Ryzen 7 Pro 8840U (8C/16T Zen 4) + Radeon 780M (gfx1103)
; 32 GB RAM, Vulkan/RADV backend — same stack as the Strix Halo desktop.
;
; NOTE: this file is a reference copy with desktop paths. On the laptop,
; run download-models.py to generate ~/.config/llama.cpp/models.ini with
; the correct paths for that machine's HF_HUB_CACHE.
; ============================================================
[*]
c = 65536
n-gpu-layers = all
flash-attn = true
jinja = true
; 8C/16T: 6 gen threads (avoid hyperthread contention), 12 for batch
threads = 6
threads-batch = 12
batch-size = 4096
ubatch-size = 1024
cache-type-k = q8_0
cache-type-v = q8_0
load-on-startup = false
device = Vulkan0
no-mmap = true

