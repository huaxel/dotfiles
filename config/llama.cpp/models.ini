version = 1

; ============================================================
; Global defaults applied to all models unless overridden
; ============================================================
[*]
c = 65536
n-gpu-layers = all
flash-attn = true
jinja = true
threads = 32
batch-size = 4096
ubatch-size = 1024
cache-type-k = q8_0
cache-type-v = q8_0
load-on-startup = false
; Strix Halo + Vulkan/RADV defaults (apply to every model unless overridden):
;   device  — vulkan-only build; pin it so nothing auto-probes another backend
;   no-mmap — RADV GPU-faults on demand-paged mmap'd GGUF weights; load eager
device = Vulkan0
no-mmap = true

; ============================================================
; Large reasoning models (MTP versions)
; Qwen3.6 hybrid (Mamba/SSM + attention) needs swa-full.
; ROCm/KFD crashes on Strix Halo (amdgpu_vm_cpu_update GPF) —
; device=Vulkan0 bypasses KFD entirely (HIP_VISIBLE_DEVICES=-1
; in env also prevents ROCm init globally).
; ============================================================

[Qwen3.6-27B-MTP]
model = /mnt/ai_models/models/models--unsloth--Qwen3.6-27B-MTP-GGUF/snapshots/0da008d9b980b76520a952bb3aa4abbaa0955647/Qwen3.6-27B-Q4_K_M.gguf
; mmproj fails to load with current llama.cpp build — disabled until fixed
;mmproj = /mnt/ai_models/models/models--unsloth--Qwen3.6-27B-MTP-GGUF/snapshots/0da008d9b980b76520a952bb3aa4abbaa0955647/mmproj-BF16.gguf
c = 32768
; swa-full = true  ; disabled to test — crashes Vulkan context setup on Strix Halo
cache-type-k = q8_0
cache-type-v = q8_0
spec-type = draft-mtp
spec-draft-n-max = 3
load-on-startup = false
device = Vulkan0
; no-mmap required — GPU faults on demand-paged mmap'd model file via Vulkan
no-mmap = true
; fit=false — Vulkan ErrorDeviceLost in auto-fit probe; explicit config is correct
fit = false

