version = 1

; ============================================================
; MacBook Air M2 — 8 GB unified memory, Metal backend.
; Key differences from desktop/laptop configs:
;   - No device = Vulkan0 (Metal is auto-detected)
;   - No no-mmap (mmap is safe on Metal; avoids OOM on 8 GB)
;   - Reduced global ctx (32768) to keep KV cache small
;   - threads = 4 (4 performance cores; efficiency cores hurt tg)
;   - Models capped at ~5 GB to leave headroom for KV + OS
; Models stored at the default HF_HUB_CACHE: ~/.cache/huggingface/hub
; Paths below expand that to /Users/juan/.cache/huggingface/hub.
; ============================================================
[*]
c = 32768
n-gpu-layers = all
flash-attn = true
jinja = true
threads = 4
threads-batch = 8
batch-size = 2048
ubatch-size = 512
cache-type-k = q8_0
cache-type-v = q8_0
load-on-startup = false

; ============================================================
; Vision / multimodal
; ============================================================

