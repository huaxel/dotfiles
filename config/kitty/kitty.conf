# Kitty Configuration
# Mirrors config/ghostty/config so the two terminals can be A/B tested.
# Docs: https://sw.kovidgoyal.net/kitty/conf/

# ---------------------------------------------------------------------------
# Theme — TokyoNight (inline so the config is self-contained).
# Alternative: run `kitty +kitten themes` to install the theme file, then use:
#   include themes/TokyoNight.conf
# ---------------------------------------------------------------------------
# background            #1a1b26
# foreground            #c0caf5
# selection_foreground  #1a1b26
# selection_background  #33467c
# cursor                #c0caf5
# cursor_text_color     #1a1b26

# 16-color palette — folke/tokyonight.nvim "night"
# black
# color0  #15161e
# red
# color1  #f7768e
# green
# color2  #9ece6a
# yellow
# color3  #e0af68
# blue
# color4  #7aa2f7
# magenta
# color5  #bb9af7
# cyan
# color6  #7dcfff
# white
# color7  #a9b1d6
# bright black
# color8  #414868
# bright red
# color9  #f7768e
# bright green
# color10 #9ece6a
# bright yellow
# color11 #e0af68
# bright blue
# color12 #7aa2f7
# bright magenta
# color13 #bb9af7
# bright cyan
# color14 #7dcfff
# bright white
# color15 #c0caf5

# ---------------------------------------------------------------------------
# Font
# ---------------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font Mono
font_size        14.0
# Ligatures — same as Ghostty's calt/liga/dlig
font_features JetBrainsMono Nerd Font Mono +calt +liga +dlig

# Ghostty: window-inherit-font-size = false
# Kitty default: new windows use this font_size (not inherited), which matches.
# Changing font size via ctrl+shift+{+,-,0} applies to all tabs/windows by default.

# ---------------------------------------------------------------------------
# Cursor
# ---------------------------------------------------------------------------
cursor_shape          block
cursor_blink_interval 0.0

# ---------------------------------------------------------------------------
# Tab bar — TokyoNight powerline
# ---------------------------------------------------------------------------
tab_bar_style           powerline
tab_bar_edge            top
tab_bar_margin_width    4.0
tab_bar_margin_height   0.0 0.0
tab_separator           " \ue0b0 "
active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
inactive_tab_foreground #565f89
inactive_tab_background #1f2335

# ---------------------------------------------------------------------------
# Shell integration — fish
# Kitty auto-detects fish; `enabled` injects the integration snippet.
# ---------------------------------------------------------------------------
shell_integration     enabled
# shell = fish    # uncomment only if your default login shell isn't fish

# ---------------------------------------------------------------------------
# macOS specific
# ---------------------------------------------------------------------------
macos_option_as_alt    yes
confirm_os_window_close 1
background_opacity     0.86
background_blur        30

# ---------------------------------------------------------------------------
# Keybindings (mirror Ghostty + add splits/tabs).
# Note: ctrl+shift+c / ctrl+shift+v are already kitty defaults; restated for parity.
# ---------------------------------------------------------------------------
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Tabs
map cmd+t           new_tab
map cmd+w           close_tab
map cmd+shift+right next_tab
map cmd+shift+left  previous_tab

# Splits
map cmd+d          new_window
map cmd+shift+d    new_window --h
map cmd+[          previous_window
map cmd+]          next_window
map cmd+shift+[    resize_window narrower 5
map cmd+shift+]    resize_window wider 5

# Layout cycling
map cmd+backslash   next_layout


# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME
