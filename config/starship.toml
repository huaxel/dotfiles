"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](fg:#7aa2f7)$os [](fg:#7aa2f7)$username[](fg:#9aa5ce)$directory[](fg:#bb9af7)$git_branch$git_status [](fg:#e0af68)$cmd_duration$fill[](fg:#565f89)$time
[](fg:#c0caf5)$character"""

[os]
disabled = false
style = "fg:#7aa2f7"

[os.symbols]
Windows = "≤░Ξ▓"
Ubuntu = "≤░ΧΙ"
SUSE = "ΎΝΦ"
Raspbian = "≤░Ρ┐"
Mint = "≤░μφ"
Macos = "≤▒ΦΩ"
Manjaro = "ΎΝΤ"
Linux = "ΎΑμ"
Gentoo = "≤░μρ"
Fedora = "≤░μδ"
Alpine = "ΎΝΑ"
Amazon = "ΎΚ░"
Android = "ΌεΟ"
Arch = "≤░μΘ"
Artix = "≤░μΘ"
CentOS = "ΎΝΕ"
Debian = "≤░μγ"
Redhat = "≤▒Εδ"
RedHatEnterprise = "≤▒Εδ"
EndeavourOS = "ΎΙΚ"
Void = "╬δ"

[username]
show_always = true
style_user = "fg:#7aa2f7"
format = "[$user]($style) "

[time]
disabled = false
time_format = "%H:%M"
style = "fg:#565f89"

[shell]
disabled = true

[directory]
style = "fg:#9aa5ce"
format = "[ $path ]($style)"
truncation_length = 5
truncation_symbol = "έΑο/"
fish_style_pwd_dir_length = 1

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "≤░ζγ "
"Pictures" = "ΎΑ╛ "
"Developer" = "≤░▓Μ "
".config" = "≤░ΤΥ "
".dotfiles" = "≤░Θα "
"node_modules" = "≤░Οβ "
"src" = "≤░┤Κ "
"test" = "≤░βρ "
"tests" = "≤░βρ "
"home" = "≤░Με "
"projects" = "≤░Ρρ "

[git_branch]
symbol = " ≤░αυ"
style = "fg:#7aa2f7"
format = "[$symbol$branch]($style)"

[git_status]
style = "fg:#bb9af7"
format = '([$all_status$ahead_behind]($style))'
ahead = "≤░Βι$count"
behind = "≤░Βκ$count"
diverged = "≤░Βι$ahead_count≤░Βκ$behind_count"
untracked = "≤░ΜΩ$count"
modified = "≤░ζ╢$count"
staged = "≤░ΡΩ$count"
renamed = "≤░ΣΧ$count"
deleted = "≤░σ╣$count"
stashed = "≤░αΥ$count"

[cmd_duration]
min_time = 500
format = "[$duration]($style) "
style = "fg:#e0af68"

[nodejs]
format = "[Όεα $version]($style) "
style = "fg:#89b4fa"
detect_files = ["package.json", ".node-version", ".nvmrc", "bun.lockb", "yarn.lock", "pnpm-lock.yaml"]

[python]
format = "[ΌΙ╡ $version]($style) "
style = "fg:#a6e3a1"
detect_files = [".python-version", "pyproject.toml", "requirements.txt", "setup.py", "Pipfile"]

[rust]
format = "[Όηρ $version]($style) "
style = "fg:#f38ba8"

[golang]
format = "[Όαπ $version]($style) "
style = "fg:#7dcfff"

[docker_context]
format = "[≤░ερ $context]($style) "
style = "fg:#89b4fa"

[hostname]
disabled = false
ssh_only = true
format = "[$ssh_symbol$hostname]($style) "
style = "fg:#f7768e"
ssh_symbol = "≤░μΑ"

[status]
disabled = false
format = "[$symbol $status]($style) "
style = "fg:#f7768e"
symbol = "≤░ΖΩ"

[jobs]
disabled = false
format = "[$symbol$number]($style) "
style = "fg:#f9e2af"
symbol = "≤░εΟ"

[container]
disabled = false
format = "[$symbol $name]($style) "
style = "fg:#7dcfff"
symbol = "≤░ερ"

[character]
success_symbol = "[έζψ](fg:#c0caf5)"
error_symbol = "[έζψ](fg:#f7768e)"
vimcmd_symbol = "[έζχ](fg:#bb9af7)"
