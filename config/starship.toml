RockyLinux = " "
Solus = " "
SUSE = " "
Ubuntu = " "
Ultramarine = " "
Unknown = " "
Uos = " "
Void = " "
Windows = "󰍲 "
Zorin = " "

[username]
show_always = true
style_user = "fg:#7aa2f7"
format = "[$user]($style)"

[time]
disabled = false
time_format = "%H:%M"
style = "fg:#565f89"

[shell]
disabled = true

[directory]
style = "fg:#9aa5ce"
format = "[ $path ]($style)"
truncation_length = 5
truncation_symbol = "…/"
fish_style_pwd_dir_length = 1
read_only = " 󰌾"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "
".config" = "󰒓 "
".dotfiles" = "󰇘 "
"node_modules" = "󰎙 "
"src" = "󰴉 "
"test" = "󰙨 "
"tests" = "󰙨 "
"home" = "󰋜 "
"projects" = "󰐨 "

[git_branch]
symbol = " "
style = "fg:#7aa2f7"
format = "[$symbol$branch]($style)"

[git_status]
style = "fg:#bb9af7"
format = '([$all_status$ahead_behind]($style))'
ahead = "󰁠$count"
behind = "󰁡$count"
diverged = "󰁠$ahead_count󰁡$behind_count"
untracked = "󰋗$count"
modified = "󰝶$count"
staged = "󰐗$count"
renamed = "󰑕$count"
deleted = "󰩹$count"
stashed = "󰘓$count"

[git_commit]
tag_symbol = '  '

[cmd_duration]
min_time = 500
format = "[$duration]($style) "
style = "fg:#e0af68"

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "fg:#89b4fa"

[python]
symbol = " "
format = "[$symbol($version )]($style)"
style = "fg:#a6e3a1"

[rust]
symbol = "󱘗 "
format = "[$symbol($version )]($style)"
style = "fg:#f38ba8"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style = "fg:#7dcfff"

[docker_context]
symbol = " "
format = "[$symbol$context]($style) "
style = "fg:#89b4fa"

[hostname]
disabled = false
ssh_only = false
format = " in [$ssh_symbol$hostname]($style)"
style = "fg:#f7768e"
ssh_symbol = " "

[status]
disabled = false
format = "[$symbol $status]($style) "
style = "fg:#f7768e"
symbol = " "

[jobs]
disabled = false
format = "[$symbol$number]($style) "
style = "fg:#f9e2af"
symbol = "󰜎"

[container]
disabled = false
format = "[$symbol $name]($style) "
style = "fg:#7dcfff"
symbol = " "

[character]
success_symbol = "[❯](fg:#c0caf5)"
error_symbol = "[❯](fg:#f7768e)"
vimcmd_symbol = "[❮](fg:#bb9af7)"

