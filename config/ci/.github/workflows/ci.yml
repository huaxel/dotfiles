# ─────────────────────────────────────────────────────────
# CI workflow — delegates everything to `just ci`.
#
# Works with:
#   - GitHub-hosted runners (ubuntu-latest)
#   - Self-hosted runners ([self-hosted, linux])
#
# The project justfile (from ~/dotfiles/config/ci/justfile)
# auto-detects the project type and runs lint, typecheck,
# test, and build — all locally reproducible with `just ci`.
# ─────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · typecheck · test · build
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      # ── Install just if missing (the only runtime dep) ──
      - name: Setup just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      # ── Language-specific toolchain ──
      - name: Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION || '22' }}
          cache: ${{ hashFiles('pnpm-lock.yaml') && 'pnpm' || hashFiles('package-lock.json') && 'npm' || '' }}

      - name: Setup Python
        if: hashFiles('pyproject.toml', 'requirements.txt', 'setup.py', 'setup.cfg') != ''
        uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.12' }}

      - name: Setup Rust
        if: hashFiles('Cargo.toml') != ''
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Go
        if: hashFiles('go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version: ${{ vars.GO_VERSION || 'stable' }}

      # ── Install project deps ──
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            if command -v pnpm &>/dev/null && [ -f pnpm-lock.yaml ]; then
              pnpm install
            else
              npm install
            fi
          elif [ -f pyproject.toml ] && command -v uv &>/dev/null; then
            uv sync
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ── Run `just ci` — the single entry point ──
      - name: just ci
        run: just ci

      # ── Summary ──
      - name: Display project info
        run: just info 2>&1 || true
